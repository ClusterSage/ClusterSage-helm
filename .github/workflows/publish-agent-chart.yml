name: Publish agent Helm chart

on:
  push:
    branches:
      - main
    paths:
      - "charts/clusterwatch-agent/**"
      - ".github/workflows/publish-agent-chart.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Validate Azure workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${AZURE_CLIENT_ID}" ] || { echo "Missing AZURE_CLIENT_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${AZURE_TENANT_ID}" ] || { echo "Missing AZURE_TENANT_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${AZURE_SUBSCRIPTION_ID}" ] || { echo "Missing AZURE_SUBSCRIPTION_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${{ vars.ACR_NAME }}" ] || { echo "Missing ACR_NAME variable."; exit 1; }
          [ -n "${{ vars.ACR_LOGIN_SERVER }}" ] || { echo "Missing ACR_LOGIN_SERVER variable."; exit 1; }
      - uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Package and push chart
        shell: bash
        run: |
          set -euo pipefail
          CHART_VERSION="$(grep '^version:' charts/clusterwatch-agent/Chart.yaml | awk '{print $2}')"
          LOGIN_SERVER="${{ vars.ACR_LOGIN_SERVER }}"
          ACCESS_TOKEN="$(az acr login --name "${{ vars.ACR_NAME }}" --expose-token --query accessToken -o tsv)"
          test -n "$ACCESS_TOKEN"
          printf '%s' "$ACCESS_TOKEN" | helm registry login "$LOGIN_SERVER" \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin
          PACKAGE_DIR="$(mktemp -d)"
          helm package charts/clusterwatch-agent --destination "$PACKAGE_DIR"
          CHART_ARCHIVE="$(find "$PACKAGE_DIR" -maxdepth 1 -name '*.tgz' | head -n 1)"
          test -n "$CHART_ARCHIVE"
          OCI_REPOSITORY="oci://$LOGIN_SERVER/helm"
          set +e
          PUSH_OUTPUT="$(helm push "$CHART_ARCHIVE" "$OCI_REPOSITORY" 2>&1)"
          PUSH_STATUS=$?
          set -e
          echo "$PUSH_OUTPUT"
          if [ "$PUSH_STATUS" -ne 0 ]; then
            if echo "$PUSH_OUTPUT" | grep -Eqi 'already exists|409|artifact with the same tag already exists'; then
              echo "Chart clusterwatch-agent:${CHART_VERSION} already exists in $OCI_REPOSITORY. Treating rerun as success."
              exit 0
            fi
            exit "$PUSH_STATUS"
          fi
