{{- if .Values.addons.metricsServer.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clusterwatch-metrics-server-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: clusterwatch-metrics-server
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clusterwatch-metrics-server-{{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clusterwatch-metrics-server-auth-delegator-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: clusterwatch-metrics-server
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
{{- end }}
