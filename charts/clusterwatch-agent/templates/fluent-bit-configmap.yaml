{{- if .Values.fluentbit.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterwatch-fluent-bit
  namespace: {{ .Release.Namespace }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf
        storage.path  /buffers
        storage.sync  normal
        storage.checksum off
        storage.backlog.mem_limit 10M

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        storage.type      filesystem

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            On
        Labels              On
        Annotations         Off

    {{- if .Values.fluentbit.excludeAgentNamespace }}
    [FILTER]
        Name    grep
        Match   kube.*
        Exclude $kubernetes['namespace_name'] {{ .Release.Namespace }}
    {{- end }}

    [OUTPUT]
        Name          http
        Match         kube.*
        Host          clusterwatch-collector.{{ .Release.Namespace }}.svc.cluster.local
        Port          8080
        URI           /logs
        Format        json
        Json_date_key timestamp
        Retry_Limit   False
  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
{{- end }}
