{{- if and .Values.rbac.create .Values.remediation.enabled .Values.remediation.clusterWide }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clusterwatch-agent-remediation-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: clusterwatch-agent
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: clusterwatch-agent-remediation-{{ .Release.Namespace }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
