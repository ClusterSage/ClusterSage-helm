apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterwatch-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: clusterwatch-agent
    app.kubernetes.io/component: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterwatch-agent
      app.kubernetes.io/component: collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterwatch-agent
        app.kubernetes.io/component: collector
    spec:
      serviceAccountName: clusterwatch-agent
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: collector
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CLUSTERWATCH_BACKEND_URL
              value: {{ .Values.backend.url | quote }}
            - name: CLUSTERWATCH_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLUSTERWATCH_CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            - name: CLUSTERWATCH_CLUSTER_PROVIDER
              value: {{ .Values.cluster.provider | quote }}
            - name: CLUSTERWATCH_AGENT_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: CLUSTERWATCH_HEARTBEAT_INTERVAL_SECONDS
              value: {{ .Values.agent.heartbeatIntervalSeconds | quote }}
            - name: CLUSTERWATCH_SNAPSHOT_INTERVAL_SECONDS
              value: {{ .Values.agent.snapshotIntervalSeconds | quote }}
            - name: CLUSTERWATCH_METRICS_ENABLED
              value: {{ .Values.agent.metrics.enabled | quote }}
            - name: CLUSTERWATCH_METRICS_INTERVAL_SECONDS
              value: {{ .Values.agent.metrics.intervalSeconds | quote }}
            - name: CLUSTERWATCH_METRICS_RESOURCE_USAGE_ENABLED
              value: {{ .Values.agent.metrics.resourceUsage.enabled | quote }}
            - name: CLUSTERWATCH_METRICS_KUBE_STATE_ENABLED
              value: {{ .Values.agent.metrics.kubeStateMetrics.enabled | quote }}
            - name: CLUSTERWATCH_METRICS_KUBE_STATE_URL
              value: {{ .Values.agent.metrics.kubeStateMetrics.url | quote }}
            - name: CLUSTERWATCH_METRICS_KUBE_STATE_TIMEOUT_SECONDS
              value: {{ .Values.agent.metrics.kubeStateMetrics.timeoutSeconds | quote }}
            - name: CLUSTERWATCH_METRICS_KUBELET_SUMMARY_ENABLED
              value: {{ .Values.agent.metrics.kubeletSummary.enabled | quote }}
            - name: CLUSTERWATCH_REMEDIATION_ENABLED
              value: {{ .Values.remediation.enabled | quote }}
            - name: CLUSTERWATCH_REMEDIATION_CLUSTER_WIDE
              value: {{ .Values.remediation.clusterWide | quote }}
            - name: CLUSTERWATCH_REMEDIATION_ALLOWED_NAMESPACES
              value: {{ join "," .Values.remediation.allowedNamespaces | quote }}
            - name: CLUSTERWATCH_REMEDIATION_ALLOWED_ACTIONS
              value: {{ join "," .Values.remediation.allowedActions | quote }}
            - name: CLUSTERWATCH_REMEDIATION_POLL_INTERVAL_SECONDS
              value: {{ .Values.remediation.pollIntervalSeconds | quote }}
            - name: CLUSTERWATCH_LOG_LEVEL
              value: {{ .Values.agent.logLevel | quote }}
          envFrom:
            - secretRef:
                name: clusterwatch-agent-auth
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources.collector | indent 12 }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
