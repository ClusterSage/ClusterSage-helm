backend:
  url: "https://nexaflow.site"

auth:
  email: "owner@example.com"
  accessKey: "replace-with-agent-key-from-dashboard"

cluster:
  name: "customer-cluster-name"
  provider: "aks"

agent:
  image:
    repository: "acrkubesageprod.azurecr.io/clustersage-agent"
    tag: "stable"
    pullPolicy: IfNotPresent

remediation:
  enabled: false
  clusterWide: false
  allowedNamespaces: []
  allowedActions:
    - rollout_restart
  pollIntervalSeconds: 30
