backend:
  url: "https://nexaflow.site"

auth:
  email: "owner@example.com"
  accessKey: "replace-with-agent-key-from-dashboard"

cluster:
  name: "customer-cluster-name"
  provider: "aks"

agent:
  image:
    repository: "acrclustersage.azurecr.io/clustersage-agent"
    tag: "stable"
    pullPolicy: IfNotPresent
  metrics:
    enabled: true
    intervalSeconds: 60
    resourceUsage:
      enabled: true
    kubeStateMetrics:
      enabled: true
      url: ""
      timeoutSeconds: 10
    kubeletSummary:
      enabled: true

addons:
  kubeStateMetrics:
    enabled: true
  metricsServer:
    enabled: false

remediation:
  enabled: false
  clusterWide: false
  allowedNamespaces: []
  allowedActions:
    - rollout_restart
  pollIntervalSeconds: 30
