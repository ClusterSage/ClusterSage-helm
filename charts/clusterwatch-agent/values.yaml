backend:
  url: ""
auth:
  email: ""
  accessKey: ""
cluster:
  name: ""
  provider: "aks"
imagePullSecrets: []
agent:
  image:
    repository: ""
    tag: "stable"
    pullPolicy: IfNotPresent
  logLevel: "info"
  heartbeatIntervalSeconds: 30
  snapshotIntervalSeconds: 60
  metrics:
    enabled: true
    intervalSeconds: 60
    resourceUsage:
      enabled: true
    kubeStateMetrics:
      enabled: true
      url: ""
      timeoutSeconds: 10
    kubeletSummary:
      enabled: true
remediation:
  enabled: false
  clusterWide: false
  allowedNamespaces: []
  allowedActions:
    - rollout_restart
  pollIntervalSeconds: 30
  requireServerApproval: true
fluentbit:
  enabled: true
  image:
    repository: "cr.fluentbit.io/fluent/fluent-bit"
    tag: "3.2"
    pullPolicy: IfNotPresent
  excludeAgentNamespace: true
rbac:
  create: true
addons:
  kubeStateMetrics:
    enabled: true
    image:
      repository: "registry.k8s.io/kube-state-metrics/kube-state-metrics"
      tag: "v2.19.1"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "300m"
        memory: "256Mi"
  metricsServer:
    enabled: false
    insecureKubeletTls: true
    metricResolution: "15s"
    image:
      repository: "registry.k8s.io/metrics-server/metrics-server"
      tag: "v0.8.1"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "200Mi"
      limits:
        cpu: "300m"
        memory: "400Mi"
resources:
  collector:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  fluentbit:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
nodeSelector: {}
tolerations:
  - operator: Exists
affinity: {}
