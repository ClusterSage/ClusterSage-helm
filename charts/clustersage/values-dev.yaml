frontend:
  image:
    tag: "dev"
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  env:
    NEXT_PUBLIC_API_URL: "https://dev.nexaflow.site"
backend:
  image:
    tag: "dev"
  replicaCount: 2
  env:
    APP_ENV: "dev"
    PUBLIC_APP_URL: "https://dev.nexaflow.site"
    PUBLIC_API_URL: "https://dev.nexaflow.site"
    CORS_ALLOWED_ORIGINS: "https://dev.nexaflow.site"
emailWorker:
  image:
    tag: "dev"
  replicaCount: 2
gateway:
  hostname: "dev.nexaflow.site"
  hostnames:
    - "dev.nexaflow.site"
