{{- if .Values.emailWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clustersage-email-worker
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.emailWorker.replicaCount }}
  selector:
    matchLabels: { app: clustersage-email-worker }
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config/configmap.yaml") . | sha256sum }}
        {{- if .Values.keyVault.enabled }}
        checksum/keyvault-spc: {{ include (print $.Template.BasePath "/secrets/secretproviderclass.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app: clustersage-email-worker
{{- with .Values.podLabels }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      imagePullSecrets:
{{ toYaml .Values.global.imagePullSecrets | indent 8 }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.keyVault.providerClassName | quote }}
      {{- end }}
      containers:
        - name: email-worker
          image: "{{ include "clustersage.image" (dict "image" .Values.emailWorker.image) }}"
          imagePullPolicy: {{ .Values.emailWorker.image.pullPolicy }}
          {{- if .Values.keyVault.enabled }}
          command:
            - /bin/sh
            - -c
            - |
              for file in {{ .Values.keyVault.mountPath }}/*; do
                [ -f "$file" ] || continue
                export "$(basename "$file")=$(cat "$file")"
              done
              exec python -m app.main
          {{- end }}
          envFrom:
            - configMapRef: { name: clustersage-config }
            {{- if not .Values.keyVault.enabled }}
            - secretRef: { name: clustersage-secrets }
            {{- end }}
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: keyvault-secrets
              mountPath: {{ .Values.keyVault.mountPath | quote }}
              readOnly: true
          {{- end }}
          resources:
{{ toYaml .Values.emailWorker.resources | indent 12 }}
{{- end }}
