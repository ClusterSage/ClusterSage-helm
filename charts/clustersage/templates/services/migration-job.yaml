{{- $migrationImage := dict "repository" (default .Values.backend.image.repository .Values.migrationJob.image.repository) "tag" (default .Values.backend.image.tag .Values.migrationJob.image.tag) "digest" (default .Values.backend.image.digest .Values.migrationJob.image.digest) -}}
{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: clustersage-migrations
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    # Run after the base workload manifests so the service account and env refs exist.
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.keyVault.providerClassName | quote }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ include "clustersage.image" (dict "image" $migrationImage) }}"
          {{- if .Values.keyVault.enabled }}
          command:
            - /bin/sh
            - -c
            - |
              for file in {{ .Values.keyVault.mountPath }}/*; do
                [ -f "$file" ] || continue
                export "$(basename "$file")=$(cat "$file")"
              done
              exec alembic upgrade head
          {{- else }}
          command: ["alembic", "upgrade", "head"]
          {{- end }}
          envFrom:
            - configMapRef: { name: clustersage-config }
            {{- if not .Values.keyVault.enabled }}
            - secretRef: { name: clustersage-secrets }
            {{- end }}
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: keyvault-secrets
              mountPath: {{ .Values.keyVault.mountPath | quote }}
              readOnly: true
          {{- end }}
{{- end }}
