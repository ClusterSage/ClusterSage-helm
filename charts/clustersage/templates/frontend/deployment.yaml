apiVersion: apps/v1
kind: Deployment
metadata:
  name: clustersage-frontend
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels: { app: clustersage-frontend }
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config/configmap.yaml") . | sha256sum }}
      labels:
        app: clustersage-frontend
{{- with .Values.podLabels }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      imagePullSecrets:
{{ toYaml .Values.global.imagePullSecrets | indent 8 }}
      containers:
        - name: frontend
          image: "{{ include "clustersage.image" (dict "image" .Values.frontend.image) }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom: { configMapKeyRef: { name: clustersage-config, key: NEXT_PUBLIC_API_URL } }
          readinessProbe:
{{ toYaml .Values.frontend.probes.readiness | indent 12 }}
          livenessProbe:
{{ toYaml .Values.frontend.probes.liveness | indent 12 }}
          startupProbe:
{{ toYaml .Values.frontend.probes.startup | indent 12 }}
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
