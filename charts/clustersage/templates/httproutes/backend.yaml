{{- if .Values.gateway.enabled }}
{{- $hostnames := default (list) .Values.gateway.hostnames }}
{{- if and (eq (len $hostnames) 0) .Values.gateway.hostname }}
{{- $hostnames = list .Values.gateway.hostname }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clustersage-backend
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
{{ if gt (len $hostnames) 0 }}
  hostnames:
{{ range $hostnames }}
    - {{ . | quote }}
{{ end }}
{{ end }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: clustersage-backend
          port: 80
{{- end }}
