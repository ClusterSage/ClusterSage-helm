frontend:
  image:
    tag: "prod"
  replicaCount: 2
  env:
    NEXT_PUBLIC_API_URL: "https://nexaflow.site"
backend:
  image:
    tag: "prod"
  replicaCount: 2
  env:
    APP_ENV: "prod"
    PUBLIC_APP_URL: "https://nexaflow.site"
    PUBLIC_API_URL: "https://nexaflow.site"
    CORS_ALLOWED_ORIGINS: "https://nexaflow.site,https://www.nexaflow.site"
emailWorker:
  image:
    tag: "prod"
  replicaCount: 1
gateway:
  hostname: "nexaflow.site"
  hostnames:
    - "nexaflow.site"
    - "www.nexaflow.site"
