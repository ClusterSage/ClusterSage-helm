frontend:
  image:
    tag: "prod"
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  env:
    NEXT_PUBLIC_API_URL: "https://nexaflow.site"
backend:
  image:
    tag: "prod"
  replicaCount: 2
  env:
    APP_ENV: "prod"
    PUBLIC_APP_URL: "https://nexaflow.site"
    PUBLIC_API_URL: "https://nexaflow.site"
    CORS_ALLOWED_ORIGINS: "https://nexaflow.site,https://www.nexaflow.site"
    ALERT_EVALUATION_ENABLED: "true"
    ALERT_EVALUATION_INTERVAL_SECONDS: "60"
emailWorker:
  image:
    tag: "prod"
  replicaCount: 2
gateway:
  hostname: "nexaflow.site"
  hostnames:
    - "nexaflow.site"
    - "www.nexaflow.site"
