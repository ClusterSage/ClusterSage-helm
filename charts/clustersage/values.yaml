global:
  imagePullSecrets: []
namespace:
  create: false
serviceAccount:
  create: true
  name: "clustersage-workloads"
  annotations: {}
podLabels: {}
keyVault:
  enabled: false
  providerClassName: "clustersage-keyvault"
  mountPath: "/mnt/secrets-store"
  vaultName: ""
  tenantId: ""
  clientId: ""
  objects: []
frontend:
  image:
    repository: "acrclustersage.azurecr.io/clustersage/frontend"
    tag: "0.1.0"
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  env:
    NEXT_PUBLIC_API_URL: ""
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  probes:
    readiness:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
    startup:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 12
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
backend:
  image:
    repository: "acrclustersage.azurecr.io/clustersage/backend"
    tag: "0.1.0"
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  env:
    APP_ENV: "production"
    PUBLIC_APP_URL: ""
    PUBLIC_API_URL: ""
    CORS_ALLOWED_ORIGINS: ""
    AZURE_AI_FOUNDRY_ENDPOINT: ""
    AZURE_AI_FOUNDRY_PROJECT_NAME: ""
    AZURE_AI_FOUNDRY_PROJECT_ID: ""
    AZURE_AI_FOUNDRY_DEPLOYMENT_NAME: ""
    AZURE_AI_FOUNDRY_API_VERSION: "2024-05-01-preview"
    AZURE_CLIENT_ID: ""
    AI_ANALYSIS_ENABLED: "false"
    AI_CLUSTER_QUERY_ENABLED: "false"
    ALERT_EVALUATION_ENABLED: "false"
    ALERT_EVALUATION_INTERVAL_SECONDS: "60"
    REMEDIATION_APPROVAL_ENABLED: "true"
    AGENT_REMEDIATION_ENABLED: "false"
    AI_MAX_LOG_LINES_PER_ANALYSIS: "200"
    AI_MAX_TOKENS: "1200"
    AI_TEMPERATURE: "0"
    AI_PROMPT_VERSION: "v1"
    AZURE_STORAGE_CONTAINER: "clustersage-data"
    AZURE_SERVICEBUS_FULLY_QUALIFIED_NAMESPACE: ""
    CLUSTER_CONNECTED_QUEUE_NAME: "cluster-connected"
    AZURE_COMMUNICATION_EMAIL_ENDPOINT: ""
    EMAIL_SENDER_ADDRESS: ""
  probes:
    readiness:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
    startup:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 18
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  secrets:
    DATABASE_URL: ""
    JWT_SECRET: "ougaidkdyatvyavdkaydv"
    AGENT_TOKEN_SECRET: "jadoaulbuydavlatdktva7a"
    AZURE_STORAGE_CONNECTION_STRING: ""
    AZURE_SERVICEBUS_CONNECTION_STRING: ""
    AZURE_COMMUNICATION_EMAIL_CONNECTION_STRING: ""
    AZURE_OPENAI_API_KEY: ""
emailWorker:
  enabled: true
  replicaCount: 1
  image:
    repository: "acrclustersage.azurecr.io/clustersage/email-worker"
    tag: "0.1.0"
    digest: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
gateway:
  enabled: true
  className: "kgateway"
  namespace: "kgateway-system"
  name: "clustersage-public"
  hostname: ""
  hostnames: []
migrations:
  enabled: true
migrationJob:
  image:
    repository: ""
    tag: ""
    digest: ""
